name: "FileBrowser"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/filebrowser.yml
      - docker/filebrowser.yml
    branches:
      - main

jobs:
  safe:
    runs-on: self-hosted
    env:
      CONFIG_FOLDER: "/mnt/unitek/config"
      FILES_FOLDER: "/mnt/unitek/files"
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker/filebrowser.yml up --wait